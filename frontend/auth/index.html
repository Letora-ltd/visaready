<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vixa — Sign In</title>
    <link rel="icon" href="../favicon.ico">
    <style>
        :root {
            --bg: #0b1a2a;
            --card-bg: rgba(17, 25, 40, 0.75);
            --accent: #A3E635;
            --accent-glow: rgba(163, 230, 53, 0.2);
            --text: #e7eef6;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, #153e5f 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #0c4855 0%, transparent 40%);
            filter: blur(80px);
            animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.1) translate(20px, 20px); }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-section h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #0b1a2a;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.875rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }

        .tab.active {
            color: var(--accent);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(163, 230, 53, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Setting up your workspace...</p>
    </div>

    <div class="login-card">
        <div class="logo-section">
            <h1>VIXA</h1>
            <p id="formTitle">Secure Intelligence Portal</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
            <div class="tab" id="tabRegister" onclick="switchTab('register')">Create Account</div>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@vixa.online">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div id="registerFields" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Continue</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <script>
        const BACKEND = 'http://127.0.0.1:8000';
        let currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
            document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
            document.getElementById('registerFields').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('submitBtn').textContent = mode === 'register' ? 'Create Account' : 'Continue';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();
            const errorEl = document.getElementById('errorMsg');

            if (!email || !password || (currentMode === 'register' && !name)) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            showLoading(true);

            try {
                const endpoint = currentMode === 'login' ? '/auth/login' : '/auth/register';
                const body = currentMode === 'login' 
                    ? { email, password } 
                    : { email, password, name };

                const res = await fetch(`${BACKEND}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }

                // Success
                localStorage.setItem('vr_token', data.token);
                localStorage.setItem('vr_user', JSON.stringify(data.user));
                localStorage.setItem('vr_role', data.role);

                document.getElementById('loadingText').textContent = 'Authenticating...';
                
                setTimeout(() => {
                    if (data.role === 'admin') {
                        window.location.href = '../admin/verification.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                }, 800);

            } catch (e) {
                showLoading(false);
                errorEl.textContent = e.message;
                errorEl.style.display = 'block';
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Session check on load
        (function() {
            const token = localStorage.getItem('vr_token');
            const role = localStorage.getItem('vr_role');
            if (token && role) {
                // If already logged in, redirect
                if (role === 'admin') window.location.href = '../admin/verification.html';
                else window.location.href = '../index.html';
            }
        })();
    </script>
</body>
</html>
