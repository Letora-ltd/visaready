<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VisaReady • Verification Console</title>
  <style>
    :root { --bg:#0b1020; --card:rgba(255,255,255,.09); --line:rgba(255,255,255,.15); --txt:#e6e9f5; --muted:#9ca3af; --acc:#7c3aed; --acc2:#06b6d4; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:radial-gradient(circle at 20% 0%,#1d2446,#0b1020 45%);color:var(--txt)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}.top{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
    .glass{background:var(--card);backdrop-filter: blur(14px);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.28)}
    .panel{padding:16px}.input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--txt)}
    .btn{border:0;border-radius:12px;padding:10px 14px;color:#fff;cursor:pointer;background:linear-gradient(120deg,var(--acc),var(--acc2));font-weight:700;position:relative;overflow:hidden}
    .btn:active{transform:translateY(1px)} .btn:hover{filter:brightness(1.08)} .btn.secondary{background:rgba(255,255,255,.1)}
    .kpi{display:flex;gap:12px;margin:14px 0}.pill{padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.08);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
    .card{padding:14px;transition:.25s transform,.25s box-shadow,.25s border-color;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.06);position:relative}
    .card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 16px 30px rgba(0,0,0,.25)} .card.active{outline:2px solid #38bdf8}
    .title{display:flex;justify-content:space-between;align-items:center;font-weight:700}.muted{color:var(--muted);font-size:13px}
    .status{font-size:12px;padding:4px 8px;border-radius:999px}.fresh{background:rgba(34,197,94,.2);color:#7fffaf}.aging{background:rgba(245,158,11,.2);color:#ffd166}.stale{background:rgba(239,68,68,.2);color:#ff9c9c}
    .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.small{font-size:12px}
    .toast{position:fixed;right:16px;bottom:16px;display:grid;gap:8px;z-index:40}.toast-item{padding:10px 12px;border-radius:10px;background:#111827;border:1px solid #374151;animation:up .25s ease}
    .toast-ok{border-color:#166534}.toast-bad{border-color:#7f1d1d}@keyframes up{from{transform:translateY(8px);opacity:.3}to{transform:none;opacity:1}}
    .shimmer{background:linear-gradient(110deg,rgba(255,255,255,.08) 8%,rgba(255,255,255,.2) 18%,rgba(255,255,255,.08) 33%);background-size:200% 100%;animation:s 1.2s linear infinite;height:140px;border-radius:16px}
    @keyframes s{to{background-position:-200% 0}} .progress{height:8px;border-radius:999px;background:rgba(255,255,255,.12)} .bar{height:100%;border-radius:inherit;background:linear-gradient(120deg,#22d3ee,#a78bfa);width:0;transition:.3s}
  </style>
</head>
<body>
<div class="wrap">
  <div class="glass panel">
    <div class="top">
      <div><div class="muted">Admin API Key</div><input id="apiKey" class="input"/></div>
      <div><div class="muted">Verified By</div><input id="verifiedBy" class="input" placeholder="admin@company"/></div>
      <button id="startBtn" class="btn">Start Verification Session</button>
    </div>
    <div class="kpi">
      <div class="pill">Completed: <b id="completed">0</b></div>
      <div class="pill">Remaining: <b id="remaining">0</b></div>
      <div style="flex:1"><div class="progress"><div id="bar" class="bar"></div></div></div>
    </div>
  </div>

  <div id="loading" class="grid" style="margin-top:14px;display:none"><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div></div>
  <div id="cards" class="grid" style="margin-top:14px"></div>
</div>
<div id="toasts" class="toast"></div>
<script>
const BACKEND='http://127.0.0.1:8000'; let tasks=[],active=0,tick=null;
const flags={FR:'🇫🇷',DE:'🇩🇪',IN:'🇮🇳',US:'🇺🇸',GB:'🇬🇧',IT:'🇮🇹',ES:'🇪🇸',NL:'🇳🇱'};
const hdr=()=>({'x-admin-key':apiKey.value});
const toast=(m,ok=true)=>{const d=document.createElement('div');d.className='toast-item '+(ok?'toast-ok':'toast-bad');d.textContent=m;toasts.appendChild(d);setTimeout(()=>d.remove(),2300);};
function freshness(last){const m=(Date.now()-new Date(last).getTime())/60000; if(m<10)return ['fresh',`${Math.floor(m)}m • fresh`]; if(m<=30)return ['aging',`${Math.floor(m)}m • aging`]; return ['stale',`${Math.floor(m)}m • STALE`];}
function render(){cards.innerHTML=''; tasks.forEach((t,i)=>{const [cls,txt]=freshness(t.last_updated); const c=document.createElement('div'); c.className='card glass '+(i===active?'active':''); c.innerHTML=`<div class='title'><div>${flags[t.country]||'🌍'} ${t.country} • ${t.city}</div><span class='status ${cls}'>${txt}</span></div><div class='muted'>${t.visa_type} • ${t.availability_status||'UNKNOWN'}</div><div class='actions'><button class='btn secondary' data-open='${i}'>🚀 Check Now</button><button class='btn' data-verify='${i}'>⚡ Verify Slots</button><button class='btn secondary' data-copy='${i}'>Copy Context</button></div>`; cards.appendChild(c);});
completed.textContent=active; remaining.textContent=Math.max(tasks.length-active,0); bar.style.width=tasks.length?`${(active/tasks.length)*100}%`:'0%';}
async function load(){loading.style.display='grid';cards.innerHTML='';try{const r=await fetch(`${BACKEND}/admin/tasks`,{headers:hdr()});const j=await r.json();tasks=j.data||[];active=0;render();toast('Session ready');}catch{toast('Failed to load tasks',false);}finally{loading.style.display='none';}}
async function openPortal(i){const t=tasks[i];const q=`country=${encodeURIComponent(t.country)}&city=${encodeURIComponent(t.city)}&visa_type=${encodeURIComponent(t.visa_type)}`;const r=await fetch(`${BACKEND}/admin/portal-link?${q}`,{headers:hdr()});const j=await r.json();if(j.data?.portal_url){window.open(j.data.portal_url,'_blank','noopener');toast('Portal opened');}else{toast(j.message||'Mapping missing',false);}}
async function verify(i){const t=tasks[i]; try{await fetch(`${BACKEND}/admin/status/${t.id}/check?verified_by=${encodeURIComponent(verifiedBy.value)}`,{method:'POST',headers:hdr()});active=Math.min(i+1,tasks.length);render();document.querySelectorAll('.card')[active]?.scrollIntoView({behavior:'smooth',block:'center'});toast('Verified ✓');}catch{toast('Verify failed',false);}}
cards.addEventListener('click',e=>{const i=e.target.dataset.open??e.target.dataset.verify??e.target.dataset.copy; if(i==null)return; const idx=Number(i); if(e.target.dataset.open!=null)openPortal(idx); if(e.target.dataset.verify!=null)verify(idx); if(e.target.dataset.copy!=null){const t=tasks[idx]; navigator.clipboard.writeText(`${t.country} - ${t.city} - ${t.visa_type}`); toast('Context copied');}});
startBtn.onclick=load; tick=setInterval(()=>tasks.length&&render(),5000);
</script>
</body>
</html>
