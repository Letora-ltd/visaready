<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='../style.css'><title>Verification Console</title></head><body><main class='container'><section class='card'><h2 class='h2'>Verification Session</h2><div class='grid'><div><div class='label'>Admin API Key</div><input id='apiKey'></div><div><div class='label'>Verified By</div><input id='verifiedBy' placeholder='admin@company'></div></div><button class='btn' id='startBtn'>Start Verification Session</button><span id='toast' class='small'></span></section><section class='card'><h3 class='h2'>Verification Context</h3><div id='ctx'></div><button class='btn' id='copyCtx'>Copy Context</button><button class='btn' id='openPortal'>Open Official Portal</button><button class='btn' id='markChecked'>Mark as Checked</button><div style='margin-top:8px'><button class='btn status' data-v='AVAILABLE'>Available</button><button class='btn status' data-v='LIMITED'>Limited</button><button class='btn status' data-v='NONE'>None</button></div><div id='freshness' class='small' style='margin-top:8px'></div><ol id='instructions'></ol></section><section class='card'><h3 class='h2'>Portal Mapping Admin</h3><div class='grid'><input id='m_country' placeholder='Country'><input id='m_city' placeholder='City'><input id='m_visa' placeholder='Visa type'><input id='m_provider' placeholder='Provider'><input id='m_url' placeholder='Portal URL'><textarea id='m_steps' placeholder='One step per line'></textarea></div><button class='btn' id='createMap'>Create Mapping</button></section></main><script>
const BACKEND='http://127.0.0.1:8000'; let tasks=[],idx=0,current=null,timer=null;
function hdr(){return {'x-admin-key':document.getElementById('apiKey').value};}
async function loadTasks(){const r=await fetch(`${BACKEND}/admin/tasks`,{headers:hdr()});const j=await r.json();tasks=j.data||[];idx=0;await loadCurrent();}
async function loadCurrent(){current=tasks[idx]; if(!current){document.getElementById('ctx').textContent='Done';return;} const ctx=`${current.country} - ${current.city} - ${current.visa_type}`;document.getElementById('ctx').textContent=ctx;document.getElementById('copyCtx').onclick=()=>navigator.clipboard.writeText(ctx);
const p=await fetch(`${BACKEND}/admin/portal-link?country=${encodeURIComponent(current.country)}&city=${encodeURIComponent(current.city)}&visa_type=${encodeURIComponent(current.visa_type)}`,{headers:hdr()}); const pj=await p.json(); if(pj.data){document.getElementById('openPortal').onclick=()=>window.open(pj.data.portal_url,'_blank','noopener');const ol=document.getElementById('instructions');ol.innerHTML='';(pj.data.instructions||[]).forEach(s=>{const li=document.createElement('li');li.textContent=s;ol.appendChild(li);});}
paintFreshness(); clearInterval(timer); timer=setInterval(paintFreshness,30000);}
function paintFreshness(){if(!current)return; const d=(Date.now()-new Date(current.last_updated).getTime())/60000; let color='green',label='fresh'; if(d>=10){color='goldenrod';label='aging';} if(d>30){color='red';label='STALE';} const el=document.getElementById('freshness');el.style.color=color;el.textContent=`${Math.floor(d)} min since update (${label})`;}
document.querySelectorAll('.status').forEach(b=>b.onclick=async()=>{const v=b.dataset.v;document.querySelectorAll('.status').forEach(x=>x.style.outline='none');b.style.outline='3px solid #333';await fetch(`${BACKEND}/admin/update`,{method:'POST',headers:{...hdr(),'Content-Type':'application/json'},body:JSON.stringify({provider:'mock'})});document.getElementById('toast').textContent=`Set ${v}`;});
document.getElementById('markChecked').onclick=async()=>{await fetch(`${BACKEND}/admin/status/${current.id}/check?verified_by=${encodeURIComponent(document.getElementById('verifiedBy').value)}`,{method:'POST',headers:hdr()});document.getElementById('toast').textContent='Checked';idx++;loadCurrent();};
document.getElementById('startBtn').onclick=loadTasks;
document.getElementById('createMap').onclick=async()=>{const steps=document.getElementById('m_steps').value.split('\n').map(s=>s.trim()).filter(Boolean);await fetch(`${BACKEND}/admin/portal`,{method:'POST',headers:{...hdr(),'Content-Type':'application/json'},body:JSON.stringify({country:m_country.value,city:m_city.value,visa_type:m_visa.value,provider:m_provider.value,portal_url:m_url.value,instructions:steps})});document.getElementById('toast').textContent='Mapping saved';};
</script></body></html>
