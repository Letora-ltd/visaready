services:
  - type: web
    name: vixaa-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        value: https://vixaa.online,https://www.vixaa.online
