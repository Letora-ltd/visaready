<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vixaa | Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0B; color: #E5E7EB; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md space-y-8 glass p-8 rounded-2xl">
        <div class="text-center">
            <div class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white mx-auto mb-4 text-xl">V</div>
            <h2 class="text-3xl font-bold tracking-tight">Create Account</h2>
            <p class="text-gray-400 mt-2">Start tracking visa slots in real-time</p>
        </div>

        <form id="signup-form" class="space-y-4">
            <div class="space-y-1">
                <label class="text-sm font-medium text-gray-400">Full Name</label>
                <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-colors">
            </div>
            <div class="space-y-1">
                <label class="text-sm font-medium text-gray-400">Email Address</label>
                <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-colors">
            </div>
            <div class="space-y-1">
                <label class="text-sm font-medium text-gray-400">Password</label>
                <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/20 transition-all mt-4">
                Join Vixaa
            </button>
        </form>

        <div class="text-center text-sm text-gray-500">
            Already have an account? <a href="/login" class="text-blue-400 hover:underline">Log in</a>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    const err = await response.json();
                    alert(err.detail || "Signup failed");
                }
            } catch (error) {
                alert("Connection error. Please try again.");
            }
        });
    </script>
</body>
</html>
